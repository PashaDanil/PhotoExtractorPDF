name: dev

services:
  # ===================
  # Infrastructure
  # ===================
  
  redis:
    image: redis:8.6-rc1-alpine3.23
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass redis_dev_password
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_dev_password", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    container_name: minio
    restart: unless-stopped
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    environment:
      MINIO_ROOT_USER: imgpdf_dev
      MINIO_ROOT_PASSWORD: imgpdf_dev_password
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===================
  # Application Services
  # ===================

  backend:
    build:
      context: ../../apps/backend
      dockerfile: Dockerfile
    container_name: backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - REDIS_URL=redis:6379
      - REDIS_PASSWORD=redis_dev_password
      - MINIO_URL=minio:9000
      - MINIO_ROOT_USER=imgpdf_dev
      - MINIO_ROOT_PASSWORD=imgpdf_dev_password
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    # Development: uncomment for hot reload with air
    # volumes:
    #   - ../../apps/backend:/app
    # command: air

  # frontend:
  #   build:
  #     context: ../../apps/frontend
  #     dockerfile: Dockerfile
  #   container_name: frontend
  #   restart: unless-stopped
  #   ports:
  #     - "3000:80"
  #   depends_on:
  #     - backend
  #   # Development: use vite dev server instead
  #   # profiles:
  #   #   - prod

  # Frontend dev server (hot reload)
  frontend-dev:
    image: node:25-alpine3.23
    container_name: frontend-dev
    working_dir: /app
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8080
    volumes:
      - ../../apps/frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

  # extractor:
  #   build:
  #     context: ../../apps/extractor
  #     dockerfile: Dockerfile
  #   container_name: extractor
  #   restart: unless-stopped
  #   environment:
  #     - REDIS_URL=redis:6379
  #     - REDIS_PASSWORD=redis_dev_password
  #     - MINIO_URL=minio:9000
  #     - MINIO_ROOT_USER=imgpdf_dev
  #     - MINIO_ROOT_PASSWORD=imgpdf_dev_password
  #   depends_on:
  #     redis:
  #       condition: service_healthy
  #     minio:
  #       condition: service_healthy
  #   # GPU support (uncomment if needed)
  #   # deploy:
  #   #   resources:
  #   #     reservations:
  #   #       devices:
  #   #         - driver: nvidia
  #   #           count: 1
  #   #           capabilities: [gpu]

volumes:
  redis_data:
  minio_data:
  frontend_node_modules: