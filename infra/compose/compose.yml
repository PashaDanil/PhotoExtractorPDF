name: imgpdf

services:
  backend:
    image: backend:dev
    container_name: backend
    build:
      context: ../../apps/backend
      dockerfile: Dockerfile.dev
    working_dir: /app
    ports:
      - "8080:8080"
    env_file:
      - ./.env
    depends_on:
      redis:
        condition: service_healthy
      # minio-init:
      #   condition: service_completed_successfully
    networks:
      - imgpdf
    volumes:
      - ../../apps/backend:/app
      - go-build-cache:/root/.cache/go-build
      - go-mod-cache:/go/pkg/mod
    command: [ "air", "-c", ".air.toml" ]
    restart: unless-stopped

  frontend:
    image: frontend:dev
    container_name: frontend
    build:
      context: ../../apps/frontend
      dockerfile: Dockerfile.dev
    working_dir: /app
    ports:
      - "5173:5173"
    networks:
      - imgpdf
    volumes:
      - ../../apps/frontend:/app
      - frontend-node-modules:/app/node_modules
      - npm-cache:/root/.npm
    environment:
      CHOKIDAR_USEPOLLING: "true"
    command: [ "npm", "run", "dev" ]
    depends_on:
      - backend
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    container_name: redis
    ports:
      - "6379:6379"
    env_file:
      - ./.env
    command: [ "redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}" ]
    volumes:
      - redis-data:/data
    networks:
      - imgpdf
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "PING" ]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    env_file:
      - ./.env
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD}"
    command: [ "server", "/data", "--console-address", ":9001" ]
    volumes:
      - minio-data:/data
    networks:
      - imgpdf
    restart: unless-stopped
  # minio-init:
  #   image: minio/mc:RELEASE.2025-01-17T23-25-50Z
  #   container_name: minio-init
  #   env_file:
  #     - ./.env
  #   depends_on:
  #     - minio
  #   networks:
  #     - imgpdf
  #   entrypoint: >
  #     /bin/sh -c " until mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}; do
  #       echo 'Waiting for MinIO...'; sleep 1;
  #     done; mc mb -p local/imgpdf || true; echo 'MinIO bucket imgpdf is ready'; "

volumes:
  go-build-cache:
  go-mod-cache:
  redis-data:
  minio-data:
  frontend-node-modules:
  npm-cache:


networks:
  imgpdf:
    driver: bridge
