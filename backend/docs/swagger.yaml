basePath: /
definitions:
  handler.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  handler.InitUploadResponse:
    properties:
      job_id:
        type: string
      pdf_key:
        type: string
      presigned_url:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: API для загрузки PDF и получения ZIP с изображениями
  title: PDF Image Extractor API
  version: "1.0"
paths:
  /jobs:
    post:
      consumes:
      - application/json
      description: Создает новую задачу и возвращает presigned URL для загрузки PDF
        в MinIO
      produces:
      - application/json
      responses:
        "201":
          description: Данные для загрузки
          schema:
            $ref: '#/definitions/handler.InitUploadResponse'
        "405":
          description: Метод не разрешен
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Ошибка сервера
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: Инициализировать загрузку PDF
      tags:
      - jobs
  /jobs/{job_id}/complete-upload:
    post:
      consumes:
      - application/json
      description: Отмечает задачу как готовую к обработке после успешной загрузки
        PDF
      parameters:
      - description: ID задачи
        in: path
        name: job_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Статус успешно обновлен
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Некорректный путь или ID
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "405":
          description: Метод не разрешен
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Ошибка сервера
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: Завершить загрузку PDF
      tags:
      - jobs
  /pdf:
    post:
      consumes:
      - multipart/form-data
      description: Принимает PDF файл и сохраняет его для обработки
      parameters:
      - description: PDF файл
        in: formData
        name: pdf
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: PDF успешно загружен
        "400":
          description: Некорректный запрос
          schema:
            type: string
        "500":
          description: Ошибка сервера
          schema:
            type: string
      summary: Загрузить PDF
      tags:
      - pdf
  /zip:
    get:
      description: Возвращает ZIP архив с изображениями из PDF
      produces:
      - application/zip
      responses:
        "200":
          description: ZIP архив
          schema:
            type: file
        "500":
          description: Ошибка сервера
          schema:
            type: string
      summary: Скачать ZIP с изображениями
      tags:
      - zip
swagger: "2.0"
