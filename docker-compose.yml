services:
  backend:
    container_name: backend
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8080:8080"
    restart: unless-stopped

  # frontend:
  #   container_name: frontend
  #   build:
  #     context: .
  #     dockerfile: frontend/Dockerfile
  #   ports:
  #     - "3000:8080"
  #   depends_on:
  #     - backend
  #   restart: unless-stopped

  # Development frontend with hot reload
  frontend-dev:
    container_name: frontend-dev
    build:
      context: .
      dockerfile: frontend/Dockerfile.dev
    ports:
      - "5173:5173"
    environment:
      - VITE_USE_POLLING=true
    volumes:
      - ./frontend:/frontend-dev
      - frontend-dev-node-modules:/frontend-dev/node_modules
    depends_on:
      - backend
    develop:
      watch:
        - action: sync
          path: ./frontend
          target: /frontend-dev
          ignore:
            - node_modules/

volumes:
  frontend-dev-node-modules: