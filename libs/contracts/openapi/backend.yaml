basePath: /
definitions:
  internal_echo_handlers.CompleteUploadResponse:
    properties:
      jobId:
        type: string
      status:
        type: string
    type: object
  internal_echo_handlers.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  internal_echo_handlers.InitUploadResponse:
    properties:
      jobId:
        type: string
      pdfKey:
        type: string
      uploadUrl:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: support@example.com
    name: API Support
  description: |-
    API for uploading PDF files and extracting images from them

    This API provides endpoints for:
    - Uploading PDF files via presigned URLs
    - Processing PDFs to extract images
    - Downloading extracted images as ZIP archives
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  title: PDF to Images API
  version: "1.0"
paths:
  /upload:
    post:
      consumes:
      - application/json
      description: Create a new job and get a presigned URL for uploading a PDF file
      produces:
      - application/json
      responses:
        "200":
          description: Upload initialized successfully
          schema:
            $ref: '#/definitions/internal_echo_handlers.InitUploadResponse'
        "500":
          description: Failed to initialize upload
          schema:
            $ref: '#/definitions/internal_echo_handlers.ErrorResponse'
      summary: Initialize PDF upload
      tags:
      - Jobs
  /upload/{jobId}/complete:
    post:
      consumes:
      - application/json
      description: Mark the PDF upload as complete and start processing
      parameters:
      - description: Job ID
        in: path
        name: jobId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Upload completed successfully
          schema:
            $ref: '#/definitions/internal_echo_handlers.CompleteUploadResponse'
        "500":
          description: Failed to complete upload
          schema:
            $ref: '#/definitions/internal_echo_handlers.ErrorResponse'
      summary: Complete PDF upload
      tags:
      - Jobs
swagger: "2.0"
